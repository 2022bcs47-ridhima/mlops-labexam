name: MLOps CI/CD Pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train model
        run: python train.py
      - name: Show metrics
        run: cat metrics.json
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            model.pkl
            metrics.json
  deploy:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
      - name: Check MSE and decide deployment
        id: check
        run: |
          NEW_MSE=$(python3 -c "import json; d=json.load(open('metrics.json')); print(d['mse'])")
          BEST_MSE="${{ vars.BEST_MSE }}"
          echo "New MSE: $NEW_MSE"
          echo "Baseline MSE: $BEST_MSE"
          SHOULD_DEPLOY=$(python3 -c "print('true' if float('$NEW_MSE') < float('$BEST_MSE') else 'false')")
          echo "SHOULD_DEPLOY=$SHOULD_DEPLOY" >> $GITHUB_ENV
          echo "NEW_MSE=$NEW_MSE" >> $GITHUB_ENV
      - name: SKIP - Model did not improve
        if: env.SHOULD_DEPLOY == 'false'
        run: |
          echo "Model did not improve — skipping deployment."
          echo "Evaluated by: Ridhima Edimadakala - 2022BCS0047"
          echo "New MSE (${{ env.NEW_MSE }}) is NOT better than Baseline (${{ vars.BEST_MSE }})"
      - name: Login to Docker Hub
        if: env.SHOULD_DEPLOY == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ridhimaedimadakala_2022bcs0047:latest .
      - name: Push Docker image
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ridhimaedimadakala_2022bcs0047:latest
      - name: Update BEST_MSE variable
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables/BEST_MSE \
            -d "{\"name\":\"BEST_MSE\",\"value\":\"${{ env.NEW_MSE }}\"}"
      - name: SUCCESS message
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          echo "✅ Docker image pushed: ridhimaedimadakala_2022bcs0047:latest"
          echo "BEST_MSE updated to: ${{ env.NEW_MSE }}"
